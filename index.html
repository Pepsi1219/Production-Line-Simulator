<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IE Line Simulator Pro v3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-50 p-4 md:p-8">
    <div class="max-w-6xl mx-auto bg-white p-6 rounded-2xl shadow-xl">
        <h1 class="text-3xl font-extrabold mb-6 text-slate-800 border-b pb-4">Line Balancing Simulator <span class="text-blue-600">Pro v3</span></h1>
        
        <div class="grid grid-cols-2 md:grid-cols-5 gap-3 mb-8 bg-slate-100 p-4 rounded-xl shadow-inner">
            <input type="text" id="newOpNo" placeholder="Op No." class="p-2 border rounded">
            <input type="number" id="newSAM" placeholder="SAM" class="p-2 border rounded" step="0.01">
            <input type="number" id="newAMV" placeholder="AMV" class="p-2 border rounded" step="0.01">
            <input type="number" id="newOp" placeholder="Operator" class="p-2 border rounded" step="0.01">
            <button onclick="addOperation()" class="bg-blue-600 text-white font-bold py-2 px-4 rounded hover:bg-blue-700 transition">Add Op</button>
        </div>

        <div class="flex flex-wrap items-center gap-6 mb-8 bg-blue-50 p-6 rounded-xl border border-blue-100">
            <div class="flex items-center gap-3">
                <span class="font-bold text-slate-700 text-lg">ชั่วโมงทำงาน:</span>
                <button onclick="changeHour(-1)" class="bg-white border-2 border-slate-300 text-slate-600 px-4 py-1 rounded-lg font-black hover:bg-slate-200">-</button>
                <input type="number" id="simHours" value="1" readonly class="w-16 text-center text-3xl font-black bg-transparent text-blue-600">
                <button onclick="changeHour(1)" class="bg-white border-2 border-slate-300 text-slate-600 px-4 py-1 rounded-lg font-black hover:bg-slate-200">+</button>
            </div>
            <div class="flex-grow text-right">
                <span class="text-slate-500 font-medium">Final Output:</span>
                <span id="finalOutput" class="text-5xl font-black text-green-600 ml-2">0</span> <span class="text-slate-400">Pcs</span>
            </div>
        </div>

        <div class="overflow-x-auto rounded-xl border border-slate-200 mb-8 shadow-sm">
            <table class="w-full text-left">
                <thead class="bg-slate-800 text-white text-sm">
                    <tr>
                        <th class="p-4">No.</th>
                        <th class="p-4 text-center">SAM</th>
                        <th class="p-4 text-center border-x border-slate-700">AMV</th>
                        <th class="p-4 text-center">Operator</th>
                        <th class="p-4 text-center bg-blue-900">Cap/Hr</th>
                        <th class="p-4 text-center bg-orange-600">WIP</th>
                        <th class="p-4 text-center bg-green-700">Done</th>
                        <th class="p-4 text-center">Manage</th>
                    </tr>
                </thead>
                <tbody id="opTableBody" class="divide-y divide-slate-200"></tbody>
            </table>
        </div>

        <div class="bg-slate-50 p-6 rounded-2xl border border-slate-200">
            <h2 class="text-lg font-bold mb-4 text-slate-700">Visual WIP Analysis (Real-time)</h2>
            <div class="h-64">
                <canvas id="lineChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        // Initial Data อิงจากรูปภาพของคุณ
        let operations = [
            { id: "1", sam: 16.0, amv: 16.02, op: 1 },
            { id: "2", sam: 13.7, amv: 10, op: 0.28 },
            { id: "3", sam: 15.0, amv: 11.5, op: 0.35 },
            { id: "18", sam: 45.62, amv: 46.25, op: 1.18 }
        ];

        let myChart;

        function addOperation() {
            const no = document.getElementById('newOpNo').value;
            const sam = parseFloat(document.getElementById('newSAM').value);
            const amv = parseFloat(document.getElementById('newAMV').value);
            const op = parseFloat(document.getElementById('newOp').value);

            if(no && sam && amv && op) {
                operations.push({ id: no, sam, amv, op });
                simulate();
                document.getElementById('newOpNo').value = '';
                document.getElementById('newSAM').value = '';
                document.getElementById('newAMV').value = '';
                document.getElementById('newOp').value = '';
            } else {
                alert("กรุณากรอกข้อมูลให้ครบถ้วนก่อนเพิ่มขั้นตอน");
            }
        }

        // เพิ่มฟังก์ชันลบขั้นตอน
        function deleteOperation(index) {
            if(confirm('คุณแน่ใจว่าต้องการลบขั้นตอนที่ ' + operations[index].id + ' หรือไม่?')) {
                operations.splice(index, 1);
                simulate();
            }
        }

        function simulate() {
            const hours = parseInt(document.getElementById('simHours').value);
            const tbody = document.getElementById('opTableBody');
            tbody.innerHTML = '';

            let labels = [];
            let wipData = [];
            let doneData = [];

            operations.forEach((item, index) => {
                const outputPerM = Math.ceil(3600 / item.amv);
                const capHr = Math.floor(outputPerM * item.op);
                const totalCap = capHr * hours;

                // Logic: งานที่ป้อนเข้า = งานที่เสร็จจากขั้นตอนก่อนหน้า
                let inputFromPrev = (index === 0) ? totalCap : operations[index-1].doneSoFar;
                
                let actualDone = Math.min(inputFromPrev, totalCap);
                let wip = inputFromPrev - actualDone;
                item.doneSoFar = actualDone;

                labels.push("Op " + item.id);
                wipData.push(wip);
                doneData.push(actualDone);

                tbody.innerHTML += `
                    <tr class="hover:bg-slate-50 transition">
                        <td class="p-4 font-bold text-slate-700">${item.id}</td>
                        <td class="p-4 text-center text-slate-500">${item.sam}</td>
                        <td class="p-4 text-center text-blue-600 font-bold border-x border-slate-100">${item.amv}</td>
                        <td class="p-4 text-center">${item.op}</td>
                        <td class="p-4 text-center font-bold text-blue-900 bg-blue-50">${capHr}</td>
                        <td class="p-4 text-center font-black ${wip > 0 ? 'text-orange-600' : 'text-slate-300'}">${wip.toLocaleString()}</td>
                        <td class="p-4 text-center font-black text-green-700 bg-green-50">${actualDone.toLocaleString()}</td>
                        <td class="p-4 text-center">
                            <button onclick="deleteOperation(${index})" class="text-red-500 hover:text-red-700 font-bold text-sm bg-red-50 px-2 py-1 rounded">ลบ</button>
                        </td>
                    </tr>
                `;

                if (index === operations.length - 1) {
                    document.getElementById('finalOutput').innerText = actualDone.toLocaleString();
                }
            });

            updateChart(labels, wipData, doneData);
        }

        function updateChart(labels, wipData, doneData) {
            const ctx = document.getElementById('lineChart').getContext('2d');
            if (myChart) myChart.destroy();

            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'WIP (งานค้างชิ้น)',
                            data: wipData,
                            backgroundColor: '#f97316',
                            borderRadius: 4
                        },
                        {
                            label: 'Actual Output (งานเสร็จ)',
                            data: doneData,
                            backgroundColor: '#15803d',
                            borderRadius: 4
                        }
                    ]
                },
                options: {
                    maintainAspectRatio: false,
                    responsive: true,
                    plugins: {
                        legend: { position: 'bottom' }
                    },
                    scales: {
                        y: { beginAtZero: true }
                    }
                }
            });
        }

        function changeHour(val) {
            let input = document.getElementById('simHours');
            let newVal = parseInt(input.value) + val;
            if (newVal >= 1) {
                input.value = newVal;
                simulate();
            }
        }

        simulate();
    </script>
</body>
</html>
